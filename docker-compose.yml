version: "3.9"

services:

  mcp-server:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: mcp-server

    restart: unless-stopped

    ports:
      - "3000:3000"
      - "4000:4000"
      - "5000:5000"

    environment:
      NODE_ENV: production
      TZ: Asia/Dhaka

      MCP_PORT: 3000
      REST_PORT: 4000
      SSE_PORT: 5000

      TRANSPORT: http

    volumes:
      - ./:/app

      # Optional local project access
      - D:/development/AI/mcp-server:/src

    stdin_open: true
    tty: true